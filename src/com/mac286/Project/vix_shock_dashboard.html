<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VIX Shock Analysis — React Dashboard</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<style>
  :root {
    --bg: #ffffff;
    --surface: #fafafa;
    --border: #e6e6e6;
    --text: #111111;
    --text-secondary: #6b6b6b;
    --accent: #1a73e8;
    --danger: #c62828;
    --warning: #ed6c02;
    --info: #0288d1;
    --success: #2e7d32;
    --neutral: #9e9e9e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }
  h1 { font-size: 28px; margin: 0 0 6px; font-weight: 600; }
  h2 { font-size: 18px; margin: 0 0 4px; font-weight: 600; }
  h3 { font-size: 14px; margin: 0 0 8px; font-weight: 600; }
  .subtitle { color: var(--text-secondary); font-size: 14px; }
  .label-small { color: var(--text-secondary); font-size: 12px; margin-bottom: 12px; }
  .divider { height: 1px; background: var(--border); margin: 32px 0; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 8px; }
  .stat {
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    transition: transform 200ms ease, border-color 200ms ease, background 200ms ease;
    cursor: default;
  }
  .stat:hover {
    transform: translateY(-2px);
    border-color: var(--text-secondary);
    background: var(--surface);
  }
  .stat-value { font-size: 28px; font-weight: 600; }
  .stat-value.danger  { color: var(--danger); }
  .stat-value.warning { color: var(--warning); }
  .stat-value.success { color: var(--success); }
  .stat-label { color: var(--text-secondary); font-size: 12px; margin-top: 4px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { border: 1px solid var(--border); border-radius: 6px; padding: 16px; background: var(--bg); }
  .card-header { font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .chart-wrap { height: 380px; }
  .chart-wrap-sm { height: 320px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table th, table td { padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: right; }
  table th { background: var(--surface); font-weight: 600; color: var(--text-secondary); text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em; }
  table th:first-child, table td:first-child { text-align: left; }
  tbody tr { transition: background 150ms ease; }
  tbody tr:hover { background: var(--surface); }
  code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; background: var(--surface); padding: 1px 5px; border-radius: 3px; }

  /* Entrance animations driven by IntersectionObserver toggling .in-view */
  .reveal { opacity: 0; transform: translateY(16px); transition: opacity 700ms ease-out, transform 700ms ease-out; }
  .reveal.in-view { opacity: 1; transform: translateY(0); }
  .reveal.delay-1 { transition-delay: 80ms; }
  .reveal.delay-2 { transition-delay: 160ms; }
  .reveal.delay-3 { transition-delay: 240ms; }
  .reveal.delay-4 { transition-delay: 320ms; }

  .footnote { color: var(--text-secondary); font-size: 12px; margin-top: 40px; }
</style>
</head>
<body>
  <div id="root">
    <div style="padding: 48px 24px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #444; max-width: 640px; margin: 0 auto;">
      <h2 style="margin: 0 0 8px;">Loading dashboard…</h2>
      <p style="color: #888; font-size: 13px;">
        If this message stays for more than 5 seconds, one of the CDN scripts didn't load.
        Open the browser dev-tools console (<code>Cmd + Option + I</code>) and look for red errors —
        common cause is no internet access from a <code>file://</code> page.
      </p>
    </div>
  </div>

<script>
  // Surface any uncaught error inside the page itself so a blank screen
  // never happens silently again.
  window.addEventListener('error', function (e) {
    var root = document.getElementById('root');
    if (!root) return;
    root.innerHTML =
      '<div style="padding:48px 24px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:720px;margin:0 auto;">' +
        '<h2 style="margin:0 0 8px;color:#c62828;">Dashboard failed to load</h2>' +
        '<div style="font-size:13px;color:#444;margin-bottom:8px;">' +
          (e.message || 'Unknown error') +
        '</div>' +
        '<pre style="background:#fafafa;border:1px solid #eee;padding:12px;font-size:12px;overflow:auto;">' +
          (e.filename ? e.filename + ':' + (e.lineno || '?') : '') +
        '</pre>' +
        '<div style="font-size:12px;color:#888;margin-top:12px;">' +
          'Most common cause: a CDN script (React, Recharts, or Babel) did not load. ' +
          'Open the browser console (Cmd+Option+I) for details.' +
        '</div>' +
      '</div>';
  });
</script>

<script type="text/babel" data-presets="env,react">

if (typeof Recharts === 'undefined') {
  throw new Error('Recharts UMD bundle did not load. Check the network tab for the recharts script.');
}
if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
  throw new Error('React/ReactDOM UMD bundle did not load.');
}

const {
  ResponsiveContainer, LineChart, Line, BarChart, Bar, PieChart, Pie, Cell,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend
} = Recharts;
const { useEffect, useRef, useState } = React;

/* -------------------- data -------------------- */
const YEARS = [
  '1996','1997','1998','1999','2000','2001','2002','2003','2004','2005',
  '2006','2007','2008','2009','2010','2011','2012','2013','2014','2015',
  '2016','2017','2018','2019','2020','2021','2022','2023','2024','2025'
];
const ABOVE_20 = {'1997':1,'1998':1,'2001':1,'2002':1,'2005':1,'2006':4,'2007':6,'2008':6,'2009':3,'2010':7,'2011':9,'2013':3,'2014':7,'2015':6,'2016':4,'2017':4,'2018':12,'2019':5,'2020':11,'2021':8,'2022':4,'2024':5,'2025':7};
const P10_TO_20 = {'1996':7,'1997':9,'1998':19,'1999':13,'2000':14,'2001':11,'2002':11,'2003':3,'2004':7,'2005':9,'2006':7,'2007':21,'2008':19,'2009':11,'2010':15,'2011':17,'2012':15,'2013':13,'2014':17,'2015':24,'2016':14,'2017':8,'2018':20,'2019':16,'2020':11,'2021':16,'2022':20,'2023':14,'2024':15,'2025':15};
const BELOW_N20 = {'2006':1,'2007':2,'2008':3,'2010':1,'2011':1,'2012':1,'2013':1,'2016':2,'2017':2,'2018':1,'2020':1,'2024':3,'2025':1};
const N10_TO_N20 = {'1996':4,'1997':3,'1998':14,'1999':12,'2000':8,'2001':5,'2002':6,'2003':1,'2004':4,'2005':4,'2006':7,'2007':13,'2008':15,'2009':5,'2010':6,'2011':9,'2012':12,'2013':9,'2014':17,'2015':21,'2016':13,'2017':7,'2018':20,'2019':14,'2020':11,'2021':24,'2022':5,'2023':7,'2024':10,'2025':10};

const SHOCK_RESULTS = [
  { label:'VIX above 20%',    total:115, day1Up:70,  day1Down:45,  day2Up:53,  day2Down:62,  atLeastOneUp:93,  bothUp:30,  bothDown:22 },
  { label:'VIX 10% to 20%',   total:411, day1Up:227, day1Down:184, day2Up:226, day2Down:185, atLeastOneUp:335, bothUp:118, bothDown:76 },
  { label:'VIX below -20%',   total:20,  day1Up:9,   day1Down:11,  day2Up:12,  day2Down:8,   atLeastOneUp:16,  bothUp:5,   bothDown:4  },
  { label:'VIX -10% to -20%', total:296, day1Up:153, day1Down:143, day2Up:162, day2Down:134, atLeastOneUp:230, bothUp:85,  bothDown:66 }
];

const COLOR = {
  danger:  '#c62828',
  warning: '#ed6c02',
  info:    '#0288d1',
  success: '#2e7d32',
  neutral: '#9e9e9e'
};

const sum = m => Object.values(m).reduce((a,b) => a+b, 0);
const pct = (n, d) => d === 0 ? 0 : +(100 * n / d).toFixed(1);
const totalAbove20  = sum(ABOVE_20);
const total10to20   = sum(P10_TO_20);
const totalBelowN20 = sum(BELOW_N20);
const totalN10toN20 = sum(N10_TO_N20);
const totalAll      = totalAbove20 + total10to20 + totalBelowN20 + totalN10toN20;

const yearlyData = YEARS.map(y => ({
  year: y,
  'VIX up > 20%':   ABOVE_20[y]   || 0,
  'VIX up 10–20%':  P10_TO_20[y]  || 0,
  'VIX down 10–20%': N10_TO_N20[y] || 0,
  'VIX down > 20%': BELOW_N20[y]  || 0,
}));

const pieData = [
  { name: 'VIX up > 20%',     value: totalAbove20,  color: COLOR.danger  },
  { name: 'VIX up 10–20%',    value: total10to20,   color: COLOR.warning },
  { name: 'VIX down 10–20%',  value: totalN10toN20, color: COLOR.info    },
  { name: 'VIX down > 20%',   value: totalBelowN20, color: COLOR.success },
];

const dayData = (upKey, downKey) => SHOCK_RESULTS.map(r => ({
  category: r.label,
  'SPX up':   pct(r[upKey],   r.total),
  'SPX down': pct(r[downKey], r.total),
}));

// Four mutually exclusive outcomes that sum to 100%.
// "Up then Down" = day1 up, day2 down  -> r.day1Up - r.bothUp
// "Down then Up" = day1 down, day2 up  -> r.day2Up - r.bothUp
const jointData = SHOCK_RESULTS.map(r => ({
  category: r.label,
  'Both up':      pct(r.bothUp,              r.total),
  'Down then Up': pct(r.day2Up - r.bothUp,   r.total),
  'Up then Down': pct(r.day1Up - r.bothUp,   r.total),
  'Both down':    pct(r.bothDown,            r.total),
}));

/* -------------------- reveal-on-scroll hook -------------------- */
function useInView(opts) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { setInView(true); obs.disconnect(); } });
    }, { threshold: 0.15, ...(opts || {}) });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, inView];
}

function Reveal({ children, delay, className }) {
  const [ref, inView] = useInView();
  const cls = ['reveal'];
  if (delay) cls.push('delay-' + delay);
  if (inView) cls.push('in-view');
  if (className) cls.push(className);
  return <div ref={ref} className={cls.join(' ')}>{children}</div>;
}

/* -------------------- atoms -------------------- */
function Stat({ value, label, tone }) {
  return (
    <div className="stat">
      <div className={'stat-value ' + (tone || '')}>{value}</div>
      <div className="stat-label">{label}</div>
    </div>
  );
}

const tooltipStyle = {
  background: '#ffffff',
  border: '1px solid #e6e6e6',
  borderRadius: '6px',
  fontSize: '12px',
  padding: '8px 10px'
};

/* -------------------- charts -------------------- */
function YearlyLineChart() {
  return (
    <ResponsiveContainer width="100%" height="100%">
      <LineChart data={yearlyData} margin={{ top: 12, right: 24, left: 0, bottom: 0 }}>
        <CartesianGrid strokeDasharray="3 3" stroke="#eeeeee" />
        <XAxis dataKey="year" interval={1} tick={{ fontSize: 11 }} />
        <YAxis tick={{ fontSize: 11 }} />
        <Tooltip contentStyle={tooltipStyle} />
        <Legend wrapperStyle={{ fontSize: 12 }} />
        <Line type="monotone" dataKey="VIX up > 20%"    stroke={COLOR.danger}  strokeWidth={2} dot={{ r: 3 }} activeDot={{ r: 5 }} animationDuration={1400} animationEasing="ease-out" />
        <Line type="monotone" dataKey="VIX up 10–20%"   stroke={COLOR.warning} strokeWidth={2} dot={{ r: 3 }} activeDot={{ r: 5 }} animationDuration={1400} animationBegin={150} animationEasing="ease-out" />
        <Line type="monotone" dataKey="VIX down 10–20%" stroke={COLOR.info}    strokeWidth={2} dot={{ r: 3 }} activeDot={{ r: 5 }} animationDuration={1400} animationBegin={300} animationEasing="ease-out" />
        <Line type="monotone" dataKey="VIX down > 20%"  stroke={COLOR.success} strokeWidth={2} dot={{ r: 3 }} activeDot={{ r: 5 }} animationDuration={1400} animationBegin={450} animationEasing="ease-out" />
      </LineChart>
    </ResponsiveContainer>
  );
}

function CategoryDonut() {
  const [active, setActive] = useState(null);
  return (
    <ResponsiveContainer width="100%" height="100%">
      <PieChart>
        <Tooltip
          contentStyle={tooltipStyle}
          formatter={(v, name) => [`${v} events (${(100 * v / totalAll).toFixed(1)}%)`, name]}
        />
        <Legend wrapperStyle={{ fontSize: 12 }} />
        <Pie
          data={pieData}
          dataKey="value"
          nameKey="name"
          innerRadius={60}
          outerRadius={110}
          paddingAngle={2}
          animationDuration={1200}
          animationEasing="ease-out"
          onMouseEnter={(_, idx) => setActive(idx)}
          onMouseLeave={() => setActive(null)}
        >
          {pieData.map((entry, idx) => (
            <Cell
              key={entry.name}
              fill={entry.color}
              style={{
                transform: active === idx ? 'scale(1.05)' : 'scale(1)',
                transformOrigin: '50% 50%',
                transition: 'transform 220ms ease-out',
                opacity: active === null || active === idx ? 1 : 0.5,
                cursor: 'pointer'
              }}
            />
          ))}
        </Pie>
      </PieChart>
    </ResponsiveContainer>
  );
}

function DayResponseChart({ upKey, downKey }) {
  return (
    <ResponsiveContainer width="100%" height="100%">
      <BarChart
        layout="vertical"
        data={dayData(upKey, downKey)}
        margin={{ top: 12, right: 24, left: 100, bottom: 0 }}
        stackOffset="expand"
      >
        <CartesianGrid strokeDasharray="3 3" stroke="#eeeeee" />
        <XAxis type="number" domain={[0, 1]} tickFormatter={v => Math.round(v * 100) + '%'} tick={{ fontSize: 11 }} />
        <YAxis type="category" dataKey="category" tick={{ fontSize: 11 }} width={100} />
        <Tooltip contentStyle={tooltipStyle} formatter={v => v + '%'} />
        <Legend wrapperStyle={{ fontSize: 12 }} />
        <Bar dataKey="SPX up"   stackId="a" fill={COLOR.success} animationDuration={1100} />
        <Bar dataKey="SPX down" stackId="a" fill={COLOR.danger}  animationDuration={1100} animationBegin={150} />
      </BarChart>
    </ResponsiveContainer>
  );
}

function JointOutcomeChart() {
  return (
    <ResponsiveContainer width="100%" height="100%">
      <BarChart data={jointData} margin={{ top: 12, right: 24, left: 0, bottom: 0 }}>
        <CartesianGrid strokeDasharray="3 3" stroke="#eeeeee" />
        <XAxis dataKey="category" tick={{ fontSize: 11 }} />
        <YAxis tick={{ fontSize: 11 }} tickFormatter={v => v + '%'} domain={[0, 100]} />
        <Tooltip contentStyle={tooltipStyle} formatter={v => v + '%'} />
        <Legend wrapperStyle={{ fontSize: 12 }} />
        <Bar dataKey="Both up"      stackId="a" fill={COLOR.success} animationDuration={1100} />
        <Bar dataKey="Down then Up" stackId="a" fill={COLOR.info}    animationDuration={1100} animationBegin={120} />
        <Bar dataKey="Up then Down" stackId="a" fill={COLOR.warning} animationDuration={1100} animationBegin={240} />
        <Bar dataKey="Both down"    stackId="a" fill={COLOR.danger}  animationDuration={1100} animationBegin={360} />
      </BarChart>
    </ResponsiveContainer>
  );
}

/* -------------------- table -------------------- */
function RawTable() {
  const headers = ['Shock category','Total','Up i+1','Down i+1','Up i+2','Down i+2','Both up','Both down','≥1 up'];
  const rows = SHOCK_RESULTS.map(r => [r.label, r.total, r.day1Up, r.day1Down, r.day2Up, r.day2Down, r.bothUp, r.bothDown, r.atLeastOneUp]);
  return (
    <table>
      <thead>
        <tr>{headers.map(h => <th key={h}>{h}</th>)}</tr>
      </thead>
      <tbody>
        {rows.map((row, i) => (
          <tr key={i}>{row.map((cell, j) => <td key={j}>{cell}</td>)}</tr>
        ))}
      </tbody>
    </table>
  );
}

/* -------------------- app -------------------- */
function App() {
  return (
    <div className="container">
      <Reveal>
        <header style={{ marginBottom: 32 }}>
          <h1>VIX Shock Analysis</h1>
          <div className="subtitle">
            Daily VIX percentage-change shocks (1996–2025) and the S&amp;P 500 response on the next two trading days.
            Built with React + Recharts. Hover any chart for live tooltips, click a legend item to toggle a series, hover stat cards and donut slices for micro-animations.
          </div>
        </header>
      </Reveal>

      <Reveal delay="1">
        <div className="stats">
          <Stat value={totalAll} label="Total shock events" />
          <Stat value={totalAbove20} label="VIX up > 20%" tone="danger" />
          <Stat value={total10to20}  label="VIX up 10–20%" tone="warning" />
          <Stat value={totalBelowN20 + totalN10toN20} label="VIX down > 10%" tone="success" />
        </div>
      </Reveal>

      <div className="divider"></div>

      <Reveal>
        <h2>Shock events by year</h2>
        <div className="label-small">
          Counts parsed from <code>vix_above_20.txt</code>, <code>vix_10_to_20.txt</code>,
          <code>vix_below_neg20.txt</code>, and <code>vix_neg10_to_neg20.txt</code>.
        </div>
        <div className="chart-wrap"><YearlyLineChart /></div>
      </Reveal>

      <div style={{ height: 24 }} />

      <Reveal delay="1">
        <div className="card">
          <div className="card-header">Share of events by category</div>
          <div className="chart-wrap-sm"><CategoryDonut /></div>
        </div>
      </Reveal>

      <div className="divider"></div>

      <Reveal>
        <h2>S&amp;P 500 response after each VIX shock</h2>
        <div className="label-small">
          Numbers come from <code>analyzeSPXResponse()</code> in <code>VIX_Shock_Analysis.java</code>.
          100%-stacked rows show what fraction of events closed up vs. down on each follow-up day.
        </div>
      </Reveal>

      <div className="grid-2" style={{ marginTop: 12 }}>
        <Reveal delay="1">
          <h3>Day i+1 (next trading day)</h3>
          <div className="chart-wrap-sm"><DayResponseChart upKey="day1Up" downKey="day1Down" /></div>
        </Reveal>
        <Reveal delay="2">
          <h3>Day i+2 (two days after)</h3>
          <div className="chart-wrap-sm"><DayResponseChart upKey="day2Up" downKey="day2Down" /></div>
        </Reveal>
      </div>

      <div style={{ height: 24 }} />

      <Reveal>
        <h3>Joint outcome over the next two days</h3>
        <div className="label-small">
          Four mutually exclusive paths after each shock, summing to 100%:
          both days up, down then up (recovery), up then down (fade), or both days down.
          The green + blue portion at the bottom of each bar equals the % of events that ended up on day i+2.
        </div>
        <div className="chart-wrap"><JointOutcomeChart /></div>
      </Reveal>

      <div style={{ height: 24 }} />

      <Reveal delay="1">
        <div className="card">
          <div className="card-header">Raw counts</div>
          <RawTable />
        </div>
      </Reveal>

      <div className="footnote">
        Single-file React app — React 18 + Recharts via CDN, no build step. Open in any modern browser.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
